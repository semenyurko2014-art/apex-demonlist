<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Demonlist</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding: 0; }
        .header { background: linear-gradient(to bottom, rgba(10,10,10,0.4), #0a0a0a), url('https://squarespace-cdn.com') center; background-size: cover; padding: 100px 20px 40px; text-align: center; border-bottom: 2px solid #222; }
        h1 { font-size: 3.5em; margin: 0; letter-spacing: 4px; font-weight: 900; }
        .subtitle { color: #888; font-size: 1.1em; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .list-container { max-width: 800px; margin: 40px auto; background: rgba(20, 20, 20, 0.9); padding: 20px; border-radius: 12px; border: 1px solid #252525; }
        .level-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 12px; border-bottom: 1px solid #222; }
        .level-info { display: flex; align-items: center; gap: 15px; }
        .level-thumb { width: 90px; height: 50px; border-radius: 6px; object-fit: cover; border: 1px solid #333; }
        .rank { font-size: 1.3em; font-weight: bold; color: #ffbc00; min-width: 45px; }
        .level-name { font-size: 1.15em; font-weight: bold; }
        .credits { font-size: 0.95em; color: #666; text-align: right; }
        .credits span { color: #aaa; }
    </style>
</head>
<body>
    <div class="header">
        <h1>APEX DEMONLIST</h1>
        <div class="subtitle">Персональный топ сложнейших уровней Geometry Dash</div>
    </div>
    <div class="list-container" id="demonlist">Загрузка уровней...</div>
    <script>
        fetch('./levels.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('demonlist');
                container.innerHTML = '';
                data.forEach(level => {
                    const item = document.createElement('div');
                    item.className = 'level-item';
                    item.innerHTML = `
                        <div class="level-info">
                            <span class="rank">#${level.position}</span>
                            <img class="level-thumb" src="${level.thumbnail || ''}" alt="${level.name}">
                            <span class="level-name">${level.name}</span>
                        </div>
                        <div class="credits">by <span>${level.creator}</span><br>Ver. by <span>${level.verifier}</span></div>
                    `;
                    container.appendChild(item);
                });
            })
            .catch(() => { document.getElementById('demonlist').innerText = 'Ошибка загрузки топа.'; });
    </script>
</body>
</html>
